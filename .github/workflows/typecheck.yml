name: typecheck

# Per-PR TypeScript type-check gate: runs `tsc --noEmit` (via the repo's `type-check` npm script)
# on every pull request and on pushes to main, so type errors are caught before merge.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run type-check
